services:
  # ── Infrastructure ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: "${OLLAMA_CPUS:-4}"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── Application Services ────────────────────────────────────────
  stt:
    build:
      context: .
      dockerfile: services/stt/Dockerfile
    ports:
      - "8001:8000"
    depends_on:
      - redis
    environment:
      - STT_MODEL_SIZE=${STT_MODEL_SIZE:-large-v3-turbo}
      - STT_DEVICE=${STT_DEVICE:-auto}
      - STT_COMPUTE_TYPE=${STT_COMPUTE_TYPE:-float16}
      - STT_MODEL_CACHE=/models
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - models_data:/models
    restart: unless-stopped

  brain:
    build:
      context: .
      dockerfile: services/brain/Dockerfile
    ports:
      - "8002:8000"
    depends_on:
      - ollama
      - qdrant
      - redis
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL_CHAT=${OLLAMA_MODEL_CHAT:-qwen2.5:7b-instruct-q4_K_M}
      - OLLAMA_MODEL_EMBED=${OLLAMA_MODEL_EMBED:-nomic-embed-text}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-lvca_knowledge}
      - REDIS_URL=redis://redis:6379/0
      - DESKTOP_AGENT_URL=http://host.docker.internal:9100
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./screenshots:/app/screenshots
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  tts:
    build:
      context: .
      dockerfile: services/tts/Dockerfile
    ports:
      - "8003:8000"
    depends_on:
      - redis
    environment:
      - TTS_ENGINE=${TTS_ENGINE:-piper}
      - TTS_DEVICE=${TTS_DEVICE:-cpu}
      - VOICES_DIR=/voices
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - models_data:/models
      - voice_data:/voices
    restart: unless-stopped

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - stt
      - brain
      - tts
    environment:
      - STT_SERVICE_URL=http://stt:8000
      - BRAIN_SERVICE_URL=http://brain:8000
      - TTS_SERVICE_URL=http://tts:8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped

  # ── Monitoring ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_data:
  redis_data:
  models_data:
  voice_data:
  prometheus_data:
  grafana_data:
