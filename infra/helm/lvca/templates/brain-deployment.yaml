apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-brain
  labels:
    {{- include "lvca.labels" . | nindent 4 }}
    app.kubernetes.io/component: brain
spec:
  replicas: {{ .Values.brain.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: brain
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: brain
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        - name: wait-ollama
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z {{ .Release.Name }}-ollama {{ .Values.ollama.service.port }}; do sleep 2; done"]
        - name: wait-qdrant
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z {{ .Release.Name }}-qdrant {{ .Values.qdrant.service.port }}; do sleep 2; done"]
      containers:
        - name: brain
          image: "{{ .Values.brain.image.repository }}:{{ .Values.brain.image.tag }}"
          imagePullPolicy: {{ .Values.brain.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.brain.service.port }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
          resources:
            {{- toYaml .Values.brain.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.brain.livenessProbe.path }}
              port: {{ .Values.brain.service.port }}
            initialDelaySeconds: {{ .Values.brain.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.brain.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.brain.readinessProbe.path }}
              port: {{ .Values.brain.service.port }}
            initialDelaySeconds: {{ .Values.brain.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.brain.readinessProbe.periodSeconds }}
          {{- include "lvca.securityContext" . | nindent 10 }}
