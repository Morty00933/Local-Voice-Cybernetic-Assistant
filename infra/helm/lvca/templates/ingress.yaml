{{- if .Values.orchestrator.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  labels:
    {{- include "lvca.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: {{ .Release.Name }}-orchestrator
spec:
  ingressClassName: {{ .Values.orchestrator.ingress.className }}
  rules:
    {{- range .Values.orchestrator.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Release.Name }}-orchestrator
                port:
                  number: {{ $.Values.orchestrator.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
